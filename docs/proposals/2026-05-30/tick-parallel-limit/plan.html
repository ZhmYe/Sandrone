<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Tick Parallel Limit</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 920px; margin: 0 auto; }
    h1, h2 { line-height: 1.2; }
    code { background: #f4f4f5; padding: 2px 4px; border-radius: 4px; }
    .box { border: 1px solid #d7dce2; border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
  </style>
</head>
<body>
  <main>
    <h1>Tick Parallel Limit</h1>
    <section class="box">
      <h2>默认策略</h2>
      <p>新 workspace 默认 <code>parallel_limit = 1</code>，同一时间最多自动处理 1 个 issue。</p>
    </section>
    <section class="box">
      <h2>覆盖方式</h2>
      <p>需要临时并行时运行 <code>sandrone tick --parallel-limit 2</code>。</p>
    </section>
    <section class="box">
      <h2>调度语义</h2>
      <p>running request 占用槽位；pending request 超出上限时保留到后续 tick。</p>
    </section>
  </main>
</body>
</html>

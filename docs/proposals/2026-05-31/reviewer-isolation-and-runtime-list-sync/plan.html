<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Reviewer Isolation And Runtime List Sync</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 920px; margin: 0 auto; }
    h1, h2 { line-height: 1.2; }
    code { background: #f4f4f5; padding: 2px 4px; border-radius: 4px; }
    .box { border: 1px solid #d7dce2; border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
  </style>
</head>
<body>
  <main>
    <h1>Reviewer Isolation And Runtime List Sync</h1>
    <section class="box">
      <h2>Reviewer 独立性</h2>
      <p>每个 reviewer 使用隔离 context，不读取其他 reviewer 输出或历史 review 轮次。</p>
    </section>
    <section class="box">
      <h2>状态同步</h2>
      <p><code>list</code> 和 <code>status</code> 输出前同步 runtime <code>status.json</code> 中更靠后的状态。</p>
    </section>
    <section class="box">
      <h2>结果</h2>
      <p>REQ 已完成时，用户和未来前端不会再被 stale TSV 显示误导。</p>
    </section>
  </main>
</body>
</html>

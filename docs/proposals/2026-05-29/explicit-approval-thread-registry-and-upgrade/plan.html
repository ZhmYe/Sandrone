<head>

  <title>Explicit Approval, Thread Registry And Upgrade</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f7f9fc; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 24px; }
    section { margin-bottom: 18px; padding: 24px; border: 1px solid #d9e2ef; border-radius: 8px; background: #fff; }

    code { background: #eef2f7; padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>显式审批、Thread Registry 与 Upgrade</h1>
      <p>本 proposal 把口头审批升级为可审计 JSON 门禁，把 Codex thread 登记为可见状态，并为旧 workspace 提供迁移入口。</p>
    </section>
    <section>
      <h2>核心门禁</h2>
      <p><code>start</code> 必须检查 plan approval；<code>finish</code> 必须检查 change-doc approval。审批后 artifact 变化会触发 stale。</p>
    </section>
    <section>
      <h2>升级路径</h2>
      <p>旧项目使用 <code>sandrone upgrade --dry-run</code> 预览，再用 <code>sandrone upgrade</code> 应用迁移。</p>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Strict Issue Agent Prompt</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 860px; }
    h1 { font-size: 28px; }
    section { border-top: 1px solid #ddd; padding-top: 16px; margin-top: 20px; }
    code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>Strict Issue Agent Prompt</h1>
    <section>
      <h2>目标</h2>
      <p>让 issue-agent 在提交 reviewer 前按完整标准自检，减少低质量输出导致的 review 反复。</p>
    </section>
    <section>
      <h2>关键行为</h2>
      <ul>
        <li>明确 planning、implementation、change-doc 和 review 修复标准。</li>
        <li>每轮 journal 都记录 finding 处理和验证结果。</li>
        <li>gate unavailable、最大轮数和关键输入不可读时必须 block。</li>
      </ul>
    </section>
  </main>
</body>
</html>

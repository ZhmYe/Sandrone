<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Review Gate Unavailable Block</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 860px; }
    h1 { font-size: 28px; }
    section { border-top: 1px solid #ddd; padding-top: 16px; margin-top: 20px; }
    code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>Review Gate Unavailable Block</h1>
    <section>
      <h2>目标</h2>
      <p>把 reviewer 后端故障识别为 <code>gate_unavailable</code>，并立即阻塞 request。</p>
    </section>
    <section>
      <h2>关键行为</h2>
      <ul>
        <li>脚本失败、空输出、非法 JSON 都会写入诊断。</li>
        <li><code>plan-review</code> 和 <code>code-review</code> 遇到 gate unavailable 会 block。</li>
        <li>issue-agent 不得调用 approve/reject 或修改 approval JSON 绕过门禁。</li>
      </ul>
    </section>
  </main>
</body>
</html>

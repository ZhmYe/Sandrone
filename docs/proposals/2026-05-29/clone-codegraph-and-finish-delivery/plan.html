<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clone CodeGraph And Finish Delivery</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f7f9fc; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 24px; }
    section { margin-bottom: 18px; padding: 24px; border: 1px solid #d9e2ef; border-radius: 8px; background: #fff; }
    h1, h2 { margin-top: 0; }
    code { background: #eef2f7; padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Clone、CodeGraph 与 Finish Delivery</h1>
      <p>初始化统一为 clone 远端仓库；计划前检查 pull 与 CodeGraph；finish 在审批后提交、push，并通过可替换 PR connector 准备 PR。</p>
    </section>
    <section>
      <h2>交付路径</h2>
      <p><code>finish</code> 会把 request worktree 提交到独立分支，并调用 <code>tools/pr-create.sh</code> 创建到 <code>master</code> 的 PR。默认 GitHub issue 会在 PR body 中写入 closing keyword 以关联 issue。</p>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Worktree Start Auto Pull</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 920px; margin: 0 auto; }
    h1, h2 { line-height: 1.2; }
    code { background: #f4f4f5; padding: 2px 4px; border-radius: 4px; }
    .box { border: 1px solid #d7dce2; border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
  </style>
</head>
<body>
  <main>
    <h1>Worktree Start Auto Pull</h1>
    <section class="box">
      <h2>目标</h2>
      <p>创建 worktree 前自动快进目标仓库，避免基于过期代码开发。</p>
    </section>
    <section class="box">
      <h2>安全边界</h2>
      <p>只使用 <code>git pull --ff-only</code>，失败即 block，不自动 merge 或 rebase。</p>
    </section>
    <section class="box">
      <h2>恢复</h2>
      <p>pull 失败后通过 recovery 文档和 resume 流程恢复。</p>
    </section>
  </main>
</body>
</html>

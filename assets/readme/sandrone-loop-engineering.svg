<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1900" viewBox="0 0 3200 1900">
  <defs>
    <style>
      .bg { fill: #fbfdfc; }
      .outer { fill: #ffffff; stroke: #d8e8e3; stroke-width: 2; }
      .title { font: 58px "Avenir Next", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #26323f; letter-spacing: 0; }
      .subtitle { font: 30px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #7b8b99; letter-spacing: 0; }
      .panel-title { font: 35px "PingFang SC", "Noto Sans CJK SC", sans-serif; letter-spacing: 0; }
      .panel-subtitle { font: 14px "Avenir Next", sans-serif; fill: #8b99a4; }
      .card-title { font: 25px "Avenir Next", "PingFang SC", sans-serif; fill: #334150; letter-spacing: 0; }
      .card-kicker { font: 16px "PingFang SC", sans-serif; font-weight: 600; }
      .body { font: 18px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #697786; letter-spacing: 0; }
      .tiny { font: 13px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #7d8b96; letter-spacing: 0; }
      .label { font: 18px "PingFang SC", sans-serif; letter-spacing: 0; }
      .card { fill: #ffffff; stroke-width: 2; }
      .teal { stroke: #0ca99f; }
      .blue { stroke: #2f6eea; }
      .purple { stroke: #7658d6; }
      .red { stroke: #e45245; }
      .green { stroke: #3f9e49; }
      .orange { stroke: #d78912; }
      .muted-line { stroke: #c9ddd7; stroke-width: 3; stroke-dasharray: 11 13; fill: none; }
      .arrow { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-label { fill: #ffffff; stroke-width: 2; }
      .memory-item { fill: #ffffff; stroke-width: 2; }
    </style>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#0ca99f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#2f6eea"/>
    </marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#7658d6"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#e45245"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#3f9e49"/>
    </marker>
    <symbol id="agent" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="21" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="24" cy="18" r="8" fill="currentColor"/>
      <path d="M10 37c3-9 25-9 28 0" fill="currentColor"/>
    </symbol>
    <symbol id="shield" viewBox="0 0 48 48">
      <path d="M24 5l17 7v12c0 11-7 17-17 21C14 41 7 35 7 24V12z" fill="none" stroke="currentColor" stroke-width="3"/>
      <path d="M15 24l6 6 13-15" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="doc" viewBox="0 0 48 48">
      <path d="M13 7h16l8 8v26H13z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      <path d="M29 7v9h8M18 24h16M18 31h13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <symbol id="code" viewBox="0 0 48 48">
      <path d="M18 15L8 24l10 9M30 15l10 9-10 9M27 11l-6 26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="graph" viewBox="0 0 48 48">
      <circle cx="11" cy="24" r="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="27" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="36" cy="34" r="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <path d="M16 20l6-4M17 27l14 5M30 18l4 10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <symbol id="stack" viewBox="0 0 48 48">
      <rect x="9" y="9" width="30" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
      <rect x="9" y="20" width="30" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
      <rect x="9" y="31" width="30" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
    </symbol>
  </defs>

  <rect class="bg" width="3200" height="1900"/>
  <rect class="outer" x="55" y="48" width="3090" height="1765" rx="34"/>

  <text class="title" x="145" y="145">Sandrone: Loop Engineering for Agentic Code Automation</text>
  <text class="subtitle" x="147" y="192">把需求、代码、评审、交付与项目记忆组织成可追溯的自动化闭环</text>

  <!-- Quadrant panels -->
  <rect x="125" y="255" width="1080" height="445" rx="18" fill="#eefbf8" stroke="#0ca99f" stroke-width="4"/>
  <text class="panel-title" x="158" y="316" fill="#0ca99f">01 需求批次调度</text>
  <text class="panel-subtitle" x="160" y="340">Request cohort scheduling</text>

  <rect x="1995" y="255" width="1080" height="445" rx="18" fill="#eef4ff" stroke="#2f6eea" stroke-width="4"/>
  <text class="panel-title" x="2028" y="316" fill="#2f6eea">02 需求拆解</text>
  <text class="panel-subtitle" x="2030" y="340">Requirement decomposition</text>

  <rect x="1995" y="920" width="1080" height="445" rx="18" fill="#f3efff" stroke="#7658d6" stroke-width="4"/>
  <text class="panel-title" x="2028" y="981" fill="#7658d6">03 计划设计</text>
  <text class="panel-subtitle" x="2030" y="1005">Plan design</text>

  <rect x="125" y="920" width="1080" height="445" rx="18" fill="#fff7f5" stroke="#e45245" stroke-width="4"/>
  <text class="panel-title" x="158" y="981" fill="#e45245">04 代码开发</text>
  <text class="panel-subtitle" x="160" y="1005">Code development</text>

  <!-- Panel 01 -->
  <rect class="card teal" x="175" y="378" width="455" height="235" rx="14"/>
  <use href="#agent" x="205" y="410" width="54" height="54" style="color:#0ca99f"/>
  <text class="card-title" x="278" y="426">RequestSchedule Agent</text>
  <text class="card-kicker" x="278" y="458" fill="#0ca99f">调度智能体</text>
  <text class="body" x="278" y="497">
    <tspan x="278" dy="0">读取未完成父需求与历史状态，</tspan>
    <tspan x="278" dy="29">选择最多 N 个可并行 request，</tspan>
    <tspan x="278" dy="29">形成 active cohort，避免新需求插队</tspan>
  </text>
  <rect x="420" y="560" width="130" height="34" rx="9" fill="#ffffff" stroke="#0ca99f" stroke-width="2"/>
  <text class="tiny" x="448" y="582" fill="#0ca99f">cohort</text>

  <path d="M665 495 H725" class="arrow teal" stroke="#0ca99f" marker-end="url(#arrow-teal)"/>

  <rect class="card teal" x="750" y="378" width="405" height="235" rx="14"/>
  <use href="#shield" x="780" y="408" width="56" height="56" style="color:#0ca99f"/>
  <text class="card-title" x="854" y="426">Schedule Reviewer</text>
  <text class="card-kicker" x="854" y="458" fill="#0ca99f">调度评审</text>
  <text class="body" x="854" y="497">
    <tspan x="854" dy="0">检查选择是否在候选集内、</tspan>
    <tspan x="854" dy="29">是否超过并行上限，是否明显</tspan>
    <tspan x="854" dy="29">违反依赖、优先级或冲突边界</tspan>
  </text>

  <!-- Panel 02 -->
  <rect class="card blue" x="2045" y="378" width="455" height="235" rx="14"/>
  <use href="#agent" x="2075" y="410" width="54" height="54" style="color:#2f6eea"/>
  <text class="card-title" x="2148" y="426">Decompose Agent</text>
  <text class="card-kicker" x="2148" y="458" fill="#2f6eea">拆解智能体</text>
  <text class="body" x="2148" y="497">
    <tspan x="2148" dy="0">把父 request 拆成独立 slice，</tspan>
    <tspan x="2148" dy="29">维护依赖 DAG、验收边界、</tspan>
    <tspan x="2148" dy="29">冲突域和共享约束</tspan>
  </text>
  <g transform="translate(2265 555)" stroke="#2f6eea" fill="#ffffff" stroke-width="2">
    <line x1="0" y1="16" x2="45" y2="4"/>
    <line x1="0" y1="16" x2="45" y2="32"/>
    <line x1="45" y1="4" x2="90" y2="18"/>
    <line x1="45" y1="32" x2="90" y2="18"/>
    <circle cx="0" cy="16" r="10"/>
    <circle cx="45" cy="4" r="10"/>
    <circle cx="45" cy="32" r="10"/>
    <circle cx="90" cy="18" r="10"/>
  </g>

  <path d="M2535 495 H2595" class="arrow blue" stroke="#2f6eea" marker-end="url(#arrow-blue)"/>

  <rect class="card blue" x="2620" y="378" width="405" height="235" rx="14"/>
  <use href="#shield" x="2650" y="408" width="56" height="56" style="color:#2f6eea"/>
  <text class="card-title" x="2724" y="426">Decomposition Reviewer</text>
  <text class="card-kicker" x="2724" y="458" fill="#2f6eea">拆解评审</text>
  <text class="body" x="2724" y="497">
    <tspan x="2724" dy="0">审查 slice 是否完整、可独立</tspan>
    <tspan x="2724" dy="29">实现，DAG 是否无环，依赖与</tspan>
    <tspan x="2724" dy="29">验收标准是否足够明确</tspan>
  </text>

  <!-- Panel 03 -->
  <rect class="card purple" x="2045" y="1043" width="455" height="235" rx="14"/>
  <use href="#agent" x="2075" y="1075" width="54" height="54" style="color:#7658d6"/>
  <text class="card-title" x="2148" y="1091">Plan Agent</text>
  <text class="card-kicker" x="2148" y="1123" fill="#7658d6">计划智能体</text>
  <text class="body" x="2148" y="1162">
    <tspan x="2148" dy="0">为可运行 slice 写实现计划，</tspan>
    <tspan x="2148" dy="29">明确目标、改动范围、测试、</tspan>
    <tspan x="2148" dy="29">破坏性风险和回退条件</tspan>
  </text>

  <path d="M2535 1160 H2595" class="arrow purple" stroke="#7658d6" marker-end="url(#arrow-purple)"/>

  <rect class="card purple" x="2620" y="1043" width="405" height="235" rx="14"/>
  <use href="#shield" x="2650" y="1073" width="56" height="56" style="color:#7658d6"/>
  <text class="card-title" x="2724" y="1091">Plan Reviewer</text>
  <text class="card-kicker" x="2724" y="1123" fill="#7658d6">计划评审</text>
  <text class="body" x="2724" y="1162">
    <tspan x="2724" dy="0">审查需求覆盖、实现顺序、</tspan>
    <tspan x="2724" dy="29">测试设计、兼容性与不可破坏</tspan>
    <tspan x="2724" dy="29">约束，通过后才允许开发</tspan>
  </text>

  <!-- Panel 04 -->
  <rect class="card red" x="175" y="1043" width="455" height="235" rx="14"/>
  <use href="#agent" x="205" y="1075" width="54" height="54" style="color:#e45245"/>
  <text class="card-title" x="278" y="1091">Implementation Agent</text>
  <text class="card-kicker" x="278" y="1123" fill="#e45245">实现智能体</text>
  <text class="body" x="278" y="1162">
    <tspan x="278" dy="0">在隔离 worktree 中改代码，</tspan>
    <tspan x="278" dy="29">运行格式、编译和目标测试，</tspan>
    <tspan x="278" dy="29">同步变更说明与验证证据</tspan>
  </text>
  <rect x="310" y="1227" width="120" height="36" rx="9" fill="#ffffff" stroke="#e45245" stroke-width="2"/>
  <use href="#code" x="324" y="1234" width="22" height="22" style="color:#e45245"/>
  <text class="tiny" x="355" y="1252" fill="#e45245">代码生成</text>
  <rect x="448" y="1227" width="130" height="36" rx="9" fill="#ffffff" stroke="#e45245" stroke-width="2"/>
  <use href="#doc" x="462" y="1234" width="22" height="22" style="color:#e45245"/>
  <text class="tiny" x="493" y="1252" fill="#e45245">变更文档</text>

  <path d="M665 1160 H725" class="arrow red" stroke="#e45245" marker-end="url(#arrow-red)"/>

  <rect class="card red" x="750" y="1043" width="405" height="235" rx="14"/>
  <use href="#shield" x="780" y="1073" width="56" height="56" style="color:#e45245"/>
  <text class="card-title" x="854" y="1091">Code Reviewer</text>
  <text class="card-kicker" x="854" y="1123" fill="#e45245">代码评审</text>
  <rect x="790" y="1160" width="160" height="80" rx="10" fill="#ffffff" stroke="#e45245" stroke-width="2"/>
  <use href="#agent" x="808" y="1175" width="32" height="32" style="color:#e45245"/>
  <text class="tiny" x="850" y="1187" fill="#e45245">Test</text>
  <text class="tiny" x="850" y="1212">覆盖新增行为</text>
  <rect x="970" y="1160" width="160" height="80" rx="10" fill="#ffffff" stroke="#e45245" stroke-width="2"/>
  <use href="#agent" x="988" y="1175" width="32" height="32" style="color:#e45245"/>
  <text class="tiny" x="1030" y="1187" fill="#e45245">Design</text>
  <text class="tiny" x="1030" y="1212">检查扩展性</text>

  <!-- Central traceable loop -->
  <g transform="translate(1600 815)">
    <circle r="290" fill="none" stroke="#d7e8e2" stroke-width="2"/>
    <circle r="236" fill="none" stroke="#e3f0ec" stroke-width="2"/>
    <circle r="216" fill="none" stroke="#0ca99f" stroke-width="24" stroke-dasharray="235 1120" stroke-dashoffset="0" transform="rotate(-140)"/>
    <circle r="216" fill="none" stroke="#2f6eea" stroke-width="24" stroke-dasharray="235 1120" stroke-dashoffset="-340" transform="rotate(-140)"/>
    <circle r="216" fill="none" stroke="#7658d6" stroke-width="24" stroke-dasharray="235 1120" stroke-dashoffset="-680" transform="rotate(-140)"/>
    <circle r="216" fill="none" stroke="#e45245" stroke-width="24" stroke-dasharray="235 1120" stroke-dashoffset="-1020" transform="rotate(-140)"/>
    <rect x="-145" y="-88" width="290" height="176" rx="18" fill="#ffffff" stroke="#d7e8e2" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" style="font: 40px 'Avenir Next', sans-serif; fill:#364252">Traceable</text>
    <text x="0" y="28" text-anchor="middle" style="font: 40px 'Avenir Next', sans-serif; fill:#364252">Loop</text>
    <text x="0" y="74" text-anchor="middle" style="font: 23px 'PingFang SC', sans-serif; fill:#0ca99f">可追溯闭环</text>
  </g>

  <!-- Panel-to-loop soft links -->
  <path class="muted-line" d="M1205 620 L1335 720"/>
  <path class="muted-line" d="M1995 620 L1865 720"/>
  <path class="muted-line" d="M1995 1040 L1865 930"/>
  <path class="muted-line" d="M1205 1040 L1335 930"/>

  <!-- Flow arrows around panels -->
  <path class="arrow teal" d="M1205 480 H1520 V370 H1995" stroke="#0ca99f" marker-end="url(#arrow-teal)"/>
  <rect class="arrow-label teal" x="1450" y="348" width="205" height="40" rx="12"/>
  <text class="label" x="1484" y="375" fill="#0ca99f">调度通过</text>

  <path class="arrow blue" d="M2535 700 V920" stroke="#2f6eea" marker-end="url(#arrow-blue)"/>
  <rect class="arrow-label blue" x="2450" y="790" width="170" height="40" rx="12"/>
  <text class="label" x="2480" y="817" fill="#2f6eea">slice DAG</text>

  <path class="arrow purple" d="M1995 1160 H1690 V1285 H1205" stroke="#7658d6" marker-end="url(#arrow-purple)"/>
  <rect class="arrow-label purple" x="1490" y="1263" width="170" height="40" rx="12"/>
  <text class="label" x="1530" y="1290" fill="#7658d6">计划通过</text>

  <path class="arrow green" d="M665 920 V820 H360 V700" stroke="#3f9e49" marker-end="url(#arrow-green)"/>
  <rect class="arrow-label green" x="430" y="798" width="205" height="40" rx="12"/>
  <text class="label" x="462" y="825" fill="#3f9e49">PR交付与合并</text>

  <!-- Project memory -->
  <g>
    <line x1="940" y1="1465" x2="940" y2="1600" class="muted-line"/>
    <line x1="1200" y1="1465" x2="1200" y2="1600" class="muted-line"/>
    <line x1="1460" y1="1465" x2="1460" y2="1600" class="muted-line"/>
    <line x1="1720" y1="1465" x2="1720" y2="1600" class="muted-line"/>
    <line x1="1980" y1="1465" x2="1980" y2="1600" class="muted-line"/>
    <line x1="2240" y1="1465" x2="2240" y2="1600" class="muted-line"/>
    <rect x="215" y="1600" width="2770" height="92" rx="18" fill="#ffffff" stroke="#d7e8e2" stroke-width="2"/>
    <text x="265" y="1647" style="font: 28px 'Avenir Next', sans-serif; fill:#43505f">Project Memory</text>
    <text x="265" y="1675" class="body">项目长期记忆</text>

    <rect class="memory-item teal" x="860" y="1616" width="190" height="48" rx="10"/>
    <use href="#doc" x="878" y="1625" width="28" height="28" style="color:#0ca99f"/>
    <text class="tiny" x="917" y="1637">Obsidian</text>
    <text class="tiny" x="917" y="1657" fill="#0ca99f">变更图谱</text>

    <rect class="memory-item blue" x="1100" y="1616" width="190" height="48" rx="10"/>
    <use href="#graph" x="1118" y="1625" width="28" height="28" style="color:#2f6eea"/>
    <text class="tiny" x="1157" y="1637">CodeGraph</text>
    <text class="tiny" x="1157" y="1657" fill="#2f6eea">代码索引</text>

    <rect class="memory-item orange" x="1340" y="1616" width="190" height="48" rx="10"/>
    <use href="#doc" x="1358" y="1625" width="28" height="28" style="color:#d78912"/>
    <text class="tiny" x="1397" y="1637">Logs</text>
    <text class="tiny" x="1397" y="1657" fill="#d78912">运行日志</text>

    <rect class="memory-item red" x="1580" y="1616" width="190" height="48" rx="10"/>
    <use href="#shield" x="1598" y="1625" width="28" height="28" style="color:#e45245"/>
    <text class="tiny" x="1637" y="1637">Review</text>
    <text class="tiny" x="1637" y="1657" fill="#e45245">评审记录</text>

    <rect class="memory-item green" x="1820" y="1616" width="190" height="48" rx="10"/>
    <use href="#stack" x="1838" y="1625" width="28" height="28" style="color:#3f9e49"/>
    <text class="tiny" x="1877" y="1637">Cohort</text>
    <text class="tiny" x="1877" y="1657" fill="#3f9e49">批次状态</text>

    <rect class="memory-item purple" x="2060" y="1616" width="190" height="48" rx="10"/>
    <use href="#shield" x="2078" y="1625" width="28" height="28" style="color:#7658d6"/>
    <text class="tiny" x="2117" y="1637">Dashboard</text>
    <text class="tiny" x="2117" y="1657" fill="#7658d6">监控台</text>
  </g>
</svg>

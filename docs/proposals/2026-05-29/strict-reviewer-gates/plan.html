<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strict Reviewer Gates</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f7f9fc; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 24px; }
    section { margin-bottom: 18px; padding: 24px; border: 1px solid #d9e2ef; border-radius: 8px; background: #fff; }
    h1, h2 { margin-top: 0; }
    code { background: #eef2f7; padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>严格 Reviewer Gate</h1>
      <p>PlanReviewer 审查计划；TestReviewer 和 DesignReviewer 审查实现。任意 critical/high 都会阻断 approval。</p>
    </section>
    <section>
      <h2>可替换后端</h2>
      <p>默认脚本使用 <code>codex exec</code>，但 reviewer connector 可以替换为 Claude Code、OpenAI API 或内部 LLM。</p>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>PR Body Review Findings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #202124; }
    main { max-width: 920px; margin: 0 auto; }
    h1, h2 { line-height: 1.2; }
    code { background: #f4f4f5; padding: 2px 4px; border-radius: 4px; }
    .box { border: 1px solid #d7dce2; border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
  </style>
</head>
<body>
  <main>
    <h1>PR Body Review Findings</h1>
    <section class="box">
      <h2>目标</h2>
      <p>PR 描述直接展示最终 reviewer 的 critical、high、warning 和 info finding。</p>
    </section>
    <section class="box">
      <h2>内容</h2>
      <p>每条 finding 保留证据、影响、必要修复、建议修改和验证方式。</p>
    </section>
    <section class="box">
      <h2>边界</h2>
      <p>PR connector 不解析 review JSON，只接收框架生成好的 body file。</p>
    </section>
  </main>
</body>
</html>
